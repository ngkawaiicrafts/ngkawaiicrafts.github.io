sculptures:
  "00100dPORTRAIT_00100_BURST20200426141224419_COVER-01":
    title: "Playful Bird Figurine Duo"
    description: "Two vibrant, cartoon-style bird figurines stand side by side: one a round, cheerful character in a green skirt with a yellow bow and a tiny drumstick in hand, the other a taller purple-crested bird sporting a bright red Batman shirt. Their glossy finish and expressive features create a whimsical, collectible display set against a soft, decorative background."
  "FB_IMG_1532072542176":
    title: "Realistic Severed Hand"
    description: "A meticulously crafted sculpture of a severed human hand, posed in a tense, crawling gesture. The piece highlights lifelike skin textures, pronounced blue veins, and an anatomically precise wrist stump."
  "glowingscull":
    title: "Glow-in-the-Dark Skull Pumpkin"
    description: "This sculpture blends classic jack-o'-lantern styling with skeletal features, showcasing deep eye sockets, a carved nasal cavity, and a wide, toothy grin. Its glow-in-the-dark finish highlights the bold contours and sharp facial structure, giving the piece a striking Halloween character with a spooky, skull-inspired twist."
  "IMG_2089":
    title: "Sinister Green Pumpkin Skull"
    description: "This sculpture presents a twisted pumpkin form with sharply carved brows, a skeletal nose, and a wide, toothy grin that enhances its menacing expression. The pale green surface and darkened creases emphasize the exaggerated facial structure, while the curled stem adds a natural yet eerie finishing touch."
  "IMG_2142":
    title: "Melting Candle"
    description: "These sculptures depict candle-like figures with expressive, character-driven faces. Each form features wax-drip textures, charred wicks, and exaggerated eyes that convey distinct personalities—from wide-eyed surprise to stern intensity. Their melted contours and sculpted details emphasize the playful yet eerie charm of these candle-inspired creations."
  "IMG_2144":
    title: "Whimsical Tree Stump Character"
    description: "This sculpture portrays a stylized tree stump with carved, expressive eye-like openings and richly textured bark details. A small swing hangs from one of its branches, adding a playful, storybook quality to the piece. The combination of natural wood forms and imaginative character elements gives the sculpture a charming, animated presence."
  "IMG_8577":
    title: "Playful Pumpkin"
    description: "This small pumpkin sculpture features a lively, expressive face with rounded eyes and a mischievous smile. A glossy black witch hat tops the character, complemented by a single green leaf that adds a touch of charm. The smooth contours and whimsical details give the piece a lighthearted, magical personality."
  "IMG_8617":
    title: "Relaxed Poolside Bird"
    description: "This playful sculpture features a turquoise bird character lounging confidently on a bright pink inflatable ring. With sunglasses perched over its eyes, orange feet stretched out, and a drink in hand, the figure captures an easygoing, summertime attitude. The bold colors and smooth, rounded forms give the piece a cheerful, lighthearted personality."
  "IMG_9077":
    title: "Cute Spotted Seal Figurine"
    description: "This small sculpture features a rounded seal with smooth, glossy contours and expressive black eyes that give it an endearing personality. Soft red cheeks and subtle dark spots add character, while its compact, curled form enhances the charming, playful look of the piece."
  "IMG_9097":
    title: "Snail Cottage"
    description: "This imaginative sculpture transforms a snail into a tiny traveling home, featuring a shell shaped like a cozy cottage complete with a red shingled roof, chimney, window, and trailing vines. The snail's rounded form and raised eye stalks add personality, while the detailed miniature architecture enhances the whimsical, storybook charm of the piece."
  "IMG_9138":
    title: "Wizard Bird Figurine"
    description: "This sculpture depicts a small bird dressed as a whimsical spellcaster, complete with a pointed hat, flowing robe, and a staff topped with a crystal. Its wide eyes and bright beak add personality, while the detailed garments and accessories give the figure a charming, magical presence."
  "IMG_9325":
    title: "Flower-Loving Dragon Figurine"
    description: "This sculpture portrays a cheerful dragon with bright orange and red tones, large expressive eyes, and a friendly posture. It holds a daisy and a small heart, details that enhance its sweet, affectionate personality. The rounded shapes and smooth textures give the figure a warm, endearing charm."
  "IMG_9332":
    title: "Affectionate Dragon Duo"
    description: "These two dragon sculptures showcase bright, playful designs with expressive eyes and rounded features. One holds a heart, its gentle posture emphasizing a sweet, caring nature, while the other presents a cluster of flowers, adding a tender, cheerful touch. Their vibrant colors and charming details highlight a warm, whimsical personality in each figure."
  "IMG_9435":
    title: "Cosmic Orange Creature"
    description: "This sculpture features a rounded, alien-like character with large eyes, a gentle smile, and two star-shaped protrusions atop its head. Its smooth, glossy surface and vibrant orange color highlight the playful design, while the compact body and small limbs add to its charming, otherworldly personality."
  "NataliiaGrigoreva_2facedPumpkin_PolymerClay_3inTall_150":
    title: "Two-faced pumpkin"
    description: "This sculpture features a vividly detailed pumpkin with two exaggerated faces carved into its surface. One side sticks out its tongue with bulging eyes, while the other displays wide teeth and a startled expression. Bold colors and textured contours enhance the playful, chaotic personality of this imaginative Halloween creation."
  "NataliiaGrigoreva_2facedSquash2_Polymerclay_6-5in_150each":
    title: "Monstrous Gourd Duo"
    description: "These sculpted gourds transform natural forms into expressive, character-driven creatures. One features a vivid orange surface with pronounced bumps, a wide toothy grin, and bulging eyes that give it an energetic, mischievous presence. The other, rendered in deep green tones, carries a more somber expression with drooping eyelids and uneven teeth. Together, they showcase playful exaggeration and careful attention to facial detail, turning simple gourds into memorable sculptural personalities."
  "NataliiaGrigoreva_2facedSquashes_PolymerClay_6-5in_150each":
    title: "Halloween Gourds"
    description: "These sculpted gourds feature expressive, seasonal personalities. One is carved with a sharp-toothed, intense glare that emphasizes its angular eyes and tightly drawn grin. The other evokes a classic monster motif, complete with stitched details, heavy eyelids, and side bolts that enhance its weary, lumbering demeanor. Together, they highlight how subtle shaping and texturing can turn simple gourds into distinctive character studies."
  "NataliiaGrigoreva_CyclopesPumpkin_PolymerClay_4inTall_135":
    title: "Grotesque One-Eyed Pumpkin"
    description: "This sculpted pumpkin features a vividly distorted character, built around a single prominent eye set high above an exaggerated open mouth. Textured surfaces, layered colors, and wart-like forms give the piece a richly organic feel, while the uneven teeth and extended tongue add a touch of dark humor. The twisted stem enhances the creature's expressive silhouette, turning the pumpkin into a striking, personality-driven figure."
  "NataliiaGrigoreva_greenPumpkin_PolymerClay_4in_135":
    title: "Green Monster Pumpkin"
    description: "This piece presents a vividly carved face with sharply defined features, including deep-set red eyes, a pronounced brow, and a skeletal nose that enhances its intense expression. The uneven teeth and textured surface contribute to its weathered, creature-like character, while the twisted stem adds a dramatic finishing touch to the overall form."
  "NataliiaGrigoreva_grumpySquash_polymerClay_5in_135":
    title: "Grumpy gourd"
    description: "This sculpture emphasizes a tense, expressive face shaped from a heavily textured gourd form. Deep-set red eyes, a sharply furrowed brow, and a twisting central appendage create a sense of motion and intensity. The layered coloration and bumpy surface enhance its organic, creature-like presence, giving the figure a vivid personality."
  "NataliiaGrigoreva_smilingCreepyPumpkin_PolymerClay_12cm_135":
    title: "Snarling Pumpkin"
    description: "This sculpture highlights a vividly expressive face shaped from a heavily textured pumpkin form. Bulging green eyes framed by purple lids, deep creases, and a twisted stem create a dramatic focal point, while the uneven yellowed teeth and scar-like surface details give the piece a striking, creature-like presence."
