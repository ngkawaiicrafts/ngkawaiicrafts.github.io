drawings:
  "birdcouple":
    title: "Cute Colorful Birds on a Branch"
    description: "Hand-drawn watercolor illustration of two cute, round birds perched on a branch, featuring bright blue and warm orange feathers. A charming and whimsical artwork evoking friendship, love, and nature, ideal for children's art prints, greeting cards, or decorative wall art inspired by playful songbirds."
  "bluebird":
    title: "Cute Blue Bird Illustration on Branch"
    description: "Adorable pastel watercolor illustration of a fluffy blue bird with a crest, perched on a tree branch with fresh green leaves. Soft gradients of turquoise, purple, and pink create a playful, whimsical character with large sparkling eyes and an orange beak, perfect for children's art, greeting cards, or nursery decor."
  "bluebirdandmushrm":
    title: "Cute Blue Bird with Mushroom and Bunny"
    description: "Charming watercolor illustration of a bright blue bird with a large orange beak standing in a grassy forest clearing beside a red-capped mushroom and a small bunny. Soft pastel colors, playful character design, and a background of pine trees create a whimsical woodland scene ideal for children's books, nursery art, or fantasy animal illustrations."
  "cactus!":
    title: "Cowboy Cactus Riding a Unicorn Stick Horse"
    description: "A playful watercolor illustration of a cactus dressed as a cowboy, complete with hat and bandana, riding a whimsical unicorn stick horse against a vibrant sunset sky."
  "cat":
    title: "Sleeping Cat on Red Yarn Ball"
    description: "A peaceful illustration of a gray cat curled up atop a red ball of yarn, softly wrapped in loose strands, resting against a gentle blue watercolor background."
  "crazyHareBr":
    title: "Quirky Rabbit with Top Hat"
    description: "A playful illustration of a gray rabbit with big blue eyes, a dangling tongue, and a tilted black top hat, set against a soft blue watercolor background."
  "fox":
    title: "Fox at Twilight in Enchanted Forest"
    description: "A warm, stylized scene of a reddish-orange fox sitting thoughtfully at dusk, surrounded by leafy green hills and tall trees, while a small wide-eyed creature peeks from a tree hollow against a glowing orange-to-purple sky."
  "girl_vin3":
    title: "Girl Exploring Nature"
    description: "A gentle watercolor scene showing a red-haired girl enjoying outdoor moments—stepping into a pond, watching a dragonfly while lying in the grass, and observing butterflies among flowers."
  "harvest":
    title: "Rabbits Harvesting Pumpkins in a Autumn Patch"
    description: "A charming illustration of two anthropomorphic rabbits in a pumpkin field—one in a straw hat and overalls carrying a large pumpkin, and a smaller one playfully sitting inside a hollowed pumpkin—set against a soft, colorful outdoor backdrop."
  "koala":
    title: "Cute Koala with Leaf and Toy Mouse"
    description: "A warm watercolor illustration of an upright koala holding a leafy branch, accompanied by a small blue pull-toy mouse, set against a soft peach-yellow background."
  "Krokodilkirya":
    title: "Girl and Friendly Crocodile in Cozy Pink Room"
    description: "A whimsical illustration of a young girl in pigtails standing beside a big pot of noodles while a curious crocodile in a Santa hat sits nearby, all set within a warm, pink, toy-filled bedroom."
  "moonnight1":
    title: "Owl Perched Beneath a Glowing Moon"
    description: "A dreamy nighttime forest scene featuring a wide-eyed owl balanced atop a curved evergreen tree, illuminated by a large glowing moon against deep green and blue woodland shadows."
  "moth":
    title: "Whimsical Moth Creature with Yarn-Like Body"
    description: "A charming watercolor illustration of a moth-like character with patterned wings, fluffy antennae, and a round blue body resembling yarn, set against a warm yellow backdrop."
  "murkacow":
    title: "Chaotic Farmyard with Running Cow"
    description: "A lively, humorous farm scene featuring a startled cow named Murka dashing through the yard as chickens, chicks, a duck, a dog, a mouse, and birds scatter in energetic confusion around her."
  "nest":
    title: "Two Birds Nestled Together on a Branch"
    description: "A colorful illustration of two young sibling birds—one larger, one smaller—sitting side by side in a twig nest on a leafy branch, framed by a soft sky blending blue, pink, and yellow tones."
  "parrot":
    title: "Colorful Parrot Perched on a Berry Branch"
    description: "A vibrant illustration of a yellow-headed, green-bodied bird resting on a leafy branch adorned with red berries, set against a soft blue sky with gentle clouds."
  "sharkrider":
    title: "Shark rider"
    description: "A playful underwater illustration featuring a red octopus perched confidently on the back of a large shark, dangling a tiny, wide-eyed hammerhead as bait on a fishing line, all set against a soft blue watercolor backdrop."
  "snow_cardinal":
    title: "Winter Birds on a Wire"
    description: "A lively winter watercolor showing three birds balanced on a wire while a bright blue bird swoops in, clearly aiming to settle beside them against a softly snow-dusted sky."
  "yozhik":
    title: "Hedgehog Pulling an Apple Cart"
    description: "A playful watercolor scene featuring a smiling hedgehog strolling through the grass with a blue flower in hand, pulling a wheeled apple cart decorated with colorful stickers. Small details like a ladybug, a worm by a rock, and scattered blades of grass add charm and storybook warmth to the illustration."

lampwork:
  "PXL_20230106_233835775-01":
    title: "Autumn Green Lampwork Bracelet"
    description: "A warm blend of amber, soft white, and muted green glass beads forms this handcrafted bracelet, each lampwork bead showcasing its own subtle swirls, raised textures, and dotted details. The mix of earthy tones and intricate patterns gives the piece a gentle, organic character, highlighting the artistry behind every bead."
  "PXL_20230106_233910220-01":
    title: "Vibrant Blue and Ember Lampwork Bracelet"
    description: "This bracelet brings together bright blues, warm orange tones, soft whites, and deep reds in a lively mix of hand-formed glass beads. Each bead carries its own character through dotted patterns, swirling details, and speckled surfaces, creating a playful yet balanced composition that highlights the artistry of lampwork craftsmanship."
  "PXL_20230106_233923673-01":
    title: "Lavender and Ember Accent Lampwork Bracelet"
    description: "A lively mix of purple, soft white, orange, and deep black beads gives this bracelet a striking rhythm of color. Each hand-shaped glass bead features its own details—raised dots, swirling patterns, and textured surfaces—creating a piece that feels both playful and thoughtfully composed."
  "PXL_20230106_234018827-02":
    title: "Citrus and Sky Lampwork Bracelet"
    description: "Bright orange, cool blue, and soft purple beads come together in this vivid arrangement of hand-shaped glass pieces. Transparent accents with embedded details add depth, while the mix of smooth and textured surfaces gives the bracelet a lively, dynamic feel."
  "PXL_20230106_234037233-01":
    title: "Red and Evergreen Lampwork Bracelet"
    description: "Rich reds, fresh greens, and soft whites create a lively palette in this collection of hand-formed glass beads. Swirled patterns, dotted textures, and delicate floral motifs give each bead its own character, resulting in a bracelet with a bright, cheerful presence."
  "PXL_20230106_234049255-01":
    title: "Multicolor Carnival Lampwork Bracelet"
    description: "A lively mix of red, yellow, green, blue, and white glass beads gives this bracelet a bright, cheerful energy. Each bead features its own pattern or texture, from bold color blocks to intricate designs, creating a playful composition that highlights the variety and craftsmanship of the lampwork work."
  "PXL_20230106_234100297-02":
    title: "Orange and Violet Contrast Lampwork Bracelet"
    description: "Bold orange and deep purple beads create a striking contrast in this handcrafted glass bracelet. Accents of black and patterned beads—some dotted, some swirling—add texture and variation, giving the piece a lively, expressive character."
  "PXL_20230106_234108922-02":
    title: "Turquoise and Tangerine Accent Lampwork Bracelet"
    description: "A bright mix of turquoise, orange, green, red, and white glass beads gives this bracelet a lively, upbeat character. Each bead features its own pattern—dots, swirls, and eye-like motifs—adding variety and a sense of playful craftsmanship to the piece."
  "PXL_20230106_234119529-02":
    title: "Red, Blue, and Cream Patterned Lampwork Bracelet"
    description: "A balanced mix of red, blue, and cream beads gives this bracelet a calm but colorful presence. The combination of round and cylindrical shapes, along with dotted, swirled, and concentric designs, adds subtle variation and highlights the careful detail in each handmade glass bead."
  "PXL_20230106_234133523-01":
    title: "Sunset and Rose Lampwork Bracelet"
    description: "Warm yellows, soft pinks, and rich reds blend together in this collection of handmade glass beads. Swirled patterns, marbled tones, and dotted details give each bead its own personality, creating a bracelet with a gentle, glowing warmth."
  "PXL_20230106_234145835-01":
    title: "Blue and Green Drift Lampwork Bracelet"
    description: "Cool blues, soft greens, and crisp whites come together in this bracelet made of hand-formed glass beads. Raised dots, gentle swirls, and smooth finishes add subtle texture, giving the piece a calm, refreshing character."
  "PXL_20230106_234200892-01":
    title: "Orange, Blue, and Red Mosaic Lampwork Bracelet"
    description: "A lively mix of orange, blue, white, and red glass beads gives this bracelet a bright, energetic feel. Each bead carries its own pattern—dots, swirls, and small floral motifs—creating a varied, handcrafted look that highlights the individuality of every piece."
  "PXL_20230106_234211338-01":
    title: "Turquoise, Red, and Sunshine Lampwork Bracelet"
    description: "Bright turquoise, vivid red, warm yellow, and crisp white beads come together in this cheerful arrangement of handmade glass pieces. Polka dots, layered patterns, and smooth color blocks give each bead its own personality, creating a bracelet full of lively, colorful detail."
  "PXL_20230106_234222986-01":
    title: "Orange, Blue, and Green Playful Lampwork Bracelet"
    description: "A cheerful mix of orange, blue, white, and green glass beads gives this bracelet a bright, lively feel. Each bead brings its own character through dotted patterns, swirling details, and textured surfaces, creating a piece full of color and handcrafted charm."
  "PXL_20230106_234248155-01":
    title: "Red, White, and Black Petal-Pattern Lampwork Bracelet"
    description: "A bold mix of red, white, and black glass beads gives this bracelet a crisp, graphic look. Polka dots, small floral motifs, and smooth color blocks add variety to the arrangement, highlighting the individuality and handcrafted detail of each bead."
  "PXL_20230106_234259206-01":
    title: "Red, White, and Blue Glass-Bead Bracelet"
    description: "This bracelet brings together soft reds, crisp whites, and layered blues in a bright, easygoing mix of handmade glass beads. Some beads are dotted, others translucent, and a few blend colors in smooth gradients, giving the piece a gentle variety that feels both playful and polished."
  "PXL_20230106_234320428-01":
    title: "Red, Turquoise, and Marigold Art-Glass Bracelet"
    description: "This bracelet brings together vivid reds, warm oranges, bright turquoise, crisp whites, and deep maroon tones in a lively mix of handmade glass beads. Each bead shows off its own personality through dots, swirls, and abstract patterns, creating a piece full of color, texture, and expressive craftsmanship."
  "PXL_20230106_234331931-01":
    title: "Blue and White Textured Lampwork Bracelet"
    description: "A cool palette of blues and whites defines this bracelet, with each handmade glass bead showing its own mix of dots, swirls, and smooth color fields. The varied patterns and textures give the piece a clean, refreshing look without introducing any red tones."
  "PXL_20230106_234345455-01":
    title: "Yellow, Black, and White Graphic Lampwork Bracelet"
    description: "Bold yellows, deep blacks, and crisp whites create a striking palette in this collection of handmade glass beads. Polka dots, concentric circles, and abstract patterns give each bead its own visual rhythm, resulting in a bracelet with strong contrast and playful, modern character."
  "PXL_20230106_234356142-01":
    title: "Orange, Green, and White Textured Lampwork Bracelet"
    description: "This bracelet brings together warm oranges, soft greens, crisp whites, and earthy browns in a lively mix of handmade glass beads. Some beads are smooth, others feature raised bumps or patterned surfaces, giving the piece a playful, tactile character. The varied shapes and textures create a natural, organic rhythm that feels cheerful and full of personality."
  "PXL_20230106_234405823-01":
    title: "Red, White, and Blue Patterned Lampwork Bracelet"
    description: "A vibrant mix of red, white, and blue glass beads gives this bracelet a lively, festive feel. Each bead features its own design—polka dots, stripes, or smooth solid color—creating a playful rhythm of patterns and textures. The combination of bold tones and handcrafted details makes the piece eye-catching and full of personality."
  "PXL_20230106_234417699-01":
    title: "Red, Black, White, and Purple Mixed-Pattern Lampwork Bracelet"
    description: "This bracelet combines red, black, white, purple, and soft beige glass beads in a lively mix of shapes and patterns. Swirls, dots, and smooth color blocks give each bead its own personality, creating a piece full of handcrafted charm and bold visual contrast."
  "PXL_20230106_234439637-01":
    title: "Light Blue, White, and Orange Textured Lampwork Bracelet"
    description: "This bracelet blends soft light blues, crisp whites, and warm oranges in a cheerful mix of handmade glass beads. Some beads are smooth, others dotted or raised with textured details, creating a playful variety of patterns. The combination of cool and warm tones gives the piece a bright, friendly character with plenty of handcrafted charm."
  "PXL_20230106_234451456-01":
    title: "Pink, White, and Red Swirl-Dot Lampwork Bracelet"
    description: "Soft pinks, bright whites, and rich reds come together in this cheerful mix of handmade glass beads. Each bead shows its own personality—swirls, dots, and smooth color fields—creating a lively rhythm of patterns and textures. The combination of warm tones and playful detailing gives the bracelet a sweet, expressive character."
  "PXL_20230106_234505172-01":
    title: "Red, White, and Blue Mixed-Pattern Lampwork Bracelet"
    description: "A lively combination of red, white, and blue glass beads gives this bracelet a bright, playful character. The beads vary in size and finish—some dotted, some swirled, some smooth or translucent—creating a rhythmic mix of patterns and textures. The blend of bold colors and handcrafted details makes the piece eye-catching and full of personality."
  "PXL_20230106_234518177-01":
    title: "Blue, Yellow, and Green Patterned Lampwork Bracelet"
    description: "A bright mix of blues, yellows, and greens gives this bracelet a fresh, lively feel. Each handmade glass bead brings its own character—dots, swirls, and smooth color blends—creating a playful rhythm of patterns and textures. The combination of cool and warm tones makes the piece cheerful, vibrant, and full of handcrafted charm."
  "PXL_20230106_234526225-01":
    title: "Red, Blue, Yellow, White, and Green Multicolor Lampwork Bracelet"
    description: "A bright mix of red, blue, yellow, white, and green glass beads gives this bracelet a playful, energetic feel. Each bead features its own handcrafted details—dots, swirls, or smooth color fields—creating a lively rhythm of patterns and textures. The bold palette and varied designs make the piece cheerful and full of personality."
  "PXL_20230106_234548141-01":
    title: "Orange, White, Green, and Yellow Textured Lampwork Bracelet"
    description: "Warm oranges, crisp whites, soft greens, and sunny yellows come together in this cheerful mix of handmade glass beads. Some beads are smooth, others dotted or swirled, and a few feature raised textures that add a playful, tactile quality. The varied patterns and bright palette give the bracelet a lively, handcrafted charm that feels fresh and full of personality."
  "PXL_20230106_234559428-01":
    title: "Yellow and Green Glossy Lampwork Bracelet"
    description: "This bracelet brings together soft greens, warm yellows, and a few mixed-pattern beads to create a bright, easygoing palette. The beads vary in size and finish—some smooth and shiny, others dotted or swirled—giving the piece a gentle rhythm of textures. The overall look is cheerful, fresh, and full of handcrafted charm."
  "PXL_20230106_234609416-01":
    title: "Red, Green, and White Patterned Lampwork Bracelet"
    description: "This bracelet brings together rich reds, soft greens, and bright whites in a lively mix of handmade glass beads. Each bead has its own personality—dots, swirls, and floral-like motifs—creating a playful rhythm of color and pattern. The combination of festive tones and intricate detailing gives the piece a warm, cheerful character with plenty of handcrafted charm."
  "PXL_20230106_234636529-01":
    title: "Green, Red, White, Blue, and Purple Textured Lampwork Bracelet"
    description: "This bracelet brings together a lively mix of greens, reds, whites, blues, and purples in a playful assortment of handmade glass beads. Some beads are smooth and glossy, others feature raised dots or swirling patterns, giving the piece a fun mix of textures. The varied colors and designs create an energetic, handcrafted look that feels cheerful and full of personality."
  "PXL_20230106_234646461-01":
    title: "Orange, Red, Black, and Gray Dot-Pattern Lampwork Bracelet"
    description: "This bracelet brings together bold oranges, deep reds, sleek blacks, and soft grays in a striking mix of handmade glass beads. Many beads feature glossy raised dots, while others are smooth or swirled, creating a dynamic interplay of textures. The strong color contrasts and playful patterns give the piece an energetic, modern feel with plenty of handcrafted personality."
  "PXL_20230106_234655711-01":
    title: "Orange, Red, Black, White, and Gray Patterned Lampwork Bracelet"
    description: "This bracelet features a bold mix of orange, red, black, white, and gray glass beads, each with its own distinctive look. Some beads are dotted, others swirled or smooth, creating a lively interplay of patterns and textures. The strong contrasts and glossy finishes give the piece an energetic, handcrafted character."
  "PXL_20230106_234720959-01":
    title: "Blue, Purple, and White Textured Lampwork Bracelet"
    description: "This bracelet features a cool, calming palette of blues, purples, and whites, brought to life through a mix of handmade glass beads. Some beads are smooth and glossy, while others have raised dots or swirling patterns that add dimension and character. The varied textures and harmonious colors give the piece a soft, artistic charm with a distinctly handcrafted feel."
  "PXL_20230106_234730614-01":
    title: "Orange, Green, White, and Yellow Mixed-Pattern Lampwork Bracelet"
    description: "This bracelet features a cheerful blend of orange, green, white, and yellow glass beads, each with its own handcrafted character. Some beads are smooth and glossy, while others show dotted or swirled designs that add texture and visual interest. The bright, harmonious palette and varied patterns give the piece a warm, playful personality with a distinctly handmade charm."

sculptures:
  "00100dPORTRAIT_00100_BURST20200426141224419_COVER-01":
    title: "Playful Bird Figurine Duo"
    description: "Two vibrant, cartoon-style bird figurines stand side by side: one a round, cheerful character in a green skirt with a yellow bow and a tiny drumstick in hand, the other a taller purple-crested bird sporting a bright red Batman shirt. Their glossy finish and expressive features create a whimsical, collectible display set against a soft, decorative background."
  "FB_IMG_1532072542176":
    title: "Realistic Severed Hand"
    description: "A meticulously crafted sculpture of a severed human hand, posed in a tense, crawling gesture. The piece highlights lifelike skin textures, pronounced blue veins, and an anatomically precise wrist stump."
  "glowingscull":
    title: "Glow-in-the-Dark Skull Pumpkin"
    description: "This sculpture blends classic jack-o'-lantern styling with skeletal features, showcasing deep eye sockets, a carved nasal cavity, and a wide, toothy grin. Its glow-in-the-dark finish highlights the bold contours and sharp facial structure, giving the piece a striking Halloween character with a spooky, skull-inspired twist."
  "IMG_2089":
    title: "Sinister Green Pumpkin Skull"
    description: "This sculpture presents a twisted pumpkin form with sharply carved brows, a skeletal nose, and a wide, toothy grin that enhances its menacing expression. The pale green surface and darkened creases emphasize the exaggerated facial structure, while the curled stem adds a natural yet eerie finishing touch."
  "IMG_2142":
    title: "Melting Candle"
    description: "These sculptures depict candle-like figures with expressive, character-driven faces. Each form features wax-drip textures, charred wicks, and exaggerated eyes that convey distinct personalities—from wide-eyed surprise to stern intensity. Their melted contours and sculpted details emphasize the playful yet eerie charm of these candle-inspired creations."
  "IMG_2144":
    title: "Whimsical Tree Stump Character"
    description: "This sculpture portrays a stylized tree stump with carved, expressive eye-like openings and richly textured bark details. A small swing hangs from one of its branches, adding a playful, storybook quality to the piece. The combination of natural wood forms and imaginative character elements gives the sculpture a charming, animated presence."
  "IMG_8577":
    title: "Playful Pumpkin"
    description: "This small pumpkin sculpture features a lively, expressive face with rounded eyes and a mischievous smile. A glossy black witch hat tops the character, complemented by a single green leaf that adds a touch of charm. The smooth contours and whimsical details give the piece a lighthearted, magical personality."
  "IMG_8617":
    title: "Relaxed Poolside Bird"
    description: "This playful sculpture features a turquoise bird character lounging confidently on a bright pink inflatable ring. With sunglasses perched over its eyes, orange feet stretched out, and a drink in hand, the figure captures an easygoing, summertime attitude. The bold colors and smooth, rounded forms give the piece a cheerful, lighthearted personality."
  "IMG_9077":
    title: "Cute Spotted Seal Figurine"
    description: "This small sculpture features a rounded seal with smooth, glossy contours and expressive black eyes that give it an endearing personality. Soft red cheeks and subtle dark spots add character, while its compact, curled form enhances the charming, playful look of the piece."
  "IMG_9097":
    title: "Snail Cottage"
    description: "This imaginative sculpture transforms a snail into a tiny traveling home, featuring a shell shaped like a cozy cottage complete with a red shingled roof, chimney, window, and trailing vines. The snail's rounded form and raised eye stalks add personality, while the detailed miniature architecture enhances the whimsical, storybook charm of the piece."
  "IMG_9138":
    title: "Wizard Bird Figurine"
    description: "This sculpture depicts a small bird dressed as a whimsical spellcaster, complete with a pointed hat, flowing robe, and a staff topped with a crystal. Its wide eyes and bright beak add personality, while the detailed garments and accessories give the figure a charming, magical presence."
  "IMG_9325":
    title: "Flower-Loving Dragon Figurine"
    description: "This sculpture portrays a cheerful dragon with bright orange and red tones, large expressive eyes, and a friendly posture. It holds a daisy and a small heart, details that enhance its sweet, affectionate personality. The rounded shapes and smooth textures give the figure a warm, endearing charm."
  "IMG_9332":
    title: "Affectionate Dragon Duo"
    description: "These two dragon sculptures showcase bright, playful designs with expressive eyes and rounded features. One holds a heart, its gentle posture emphasizing a sweet, caring nature, while the other presents a cluster of flowers, adding a tender, cheerful touch. Their vibrant colors and charming details highlight a warm, whimsical personality in each figure."
  "IMG_9435":
    title: "Cosmic Orange Creature"
    description: "This sculpture features a rounded, alien-like character with large eyes, a gentle smile, and two star-shaped protrusions atop its head. Its smooth, glossy surface and vibrant orange color highlight the playful design, while the compact body and small limbs add to its charming, otherworldly personality."
  "NataliiaGrigoreva_2facedPumpkin_PolymerClay_3inTall_150":
    title: "Two-faced pumpkin"
    description: "This sculpture features a vividly detailed pumpkin with two exaggerated faces carved into its surface. One side sticks out its tongue with bulging eyes, while the other displays wide teeth and a startled expression. Bold colors and textured contours enhance the playful, chaotic personality of this imaginative Halloween creation."
  "NataliiaGrigoreva_2facedSquash2_Polymerclay_6-5in_150each":
    title: "Monstrous Gourd Duo"
    description: "These sculpted gourds transform natural forms into expressive, character-driven creatures. One features a vivid orange surface with pronounced bumps, a wide toothy grin, and bulging eyes that give it an energetic, mischievous presence. The other, rendered in deep green tones, carries a more somber expression with drooping eyelids and uneven teeth. Together, they showcase playful exaggeration and careful attention to facial detail, turning simple gourds into memorable sculptural personalities."
  "NataliiaGrigoreva_2facedSquashes_PolymerClay_6-5in_150each":
    title: "Halloween Gourds"
    description: "These sculpted gourds feature expressive, seasonal personalities. One is carved with a sharp-toothed, intense glare that emphasizes its angular eyes and tightly drawn grin. The other evokes a classic monster motif, complete with stitched details, heavy eyelids, and side bolts that enhance its weary, lumbering demeanor. Together, they highlight how subtle shaping and texturing can turn simple gourds into distinctive character studies."
  "NataliiaGrigoreva_CyclopesPumpkin_PolymerClay_4inTall_135":
    title: "Grotesque One-Eyed Pumpkin"
    description: "This sculpted pumpkin features a vividly distorted character, built around a single prominent eye set high above an exaggerated open mouth. Textured surfaces, layered colors, and wart-like forms give the piece a richly organic feel, while the uneven teeth and extended tongue add a touch of dark humor. The twisted stem enhances the creature's expressive silhouette, turning the pumpkin into a striking, personality-driven figure."
  "NataliiaGrigoreva_greenPumpkin_PolymerClay_4in_135":
    title: "Green Monster Pumpkin"
    description: "This piece presents a vividly carved face with sharply defined features, including deep-set red eyes, a pronounced brow, and a skeletal nose that enhances its intense expression. The uneven teeth and textured surface contribute to its weathered, creature-like character, while the twisted stem adds a dramatic finishing touch to the overall form."
  "NataliiaGrigoreva_grumpySquash_polymerClay_5in_135":
    title: "Grumpy gourd"
    description: "This sculpture emphasizes a tense, expressive face shaped from a heavily textured gourd form. Deep-set red eyes, a sharply furrowed brow, and a twisting central appendage create a sense of motion and intensity. The layered coloration and bumpy surface enhance its organic, creature-like presence, giving the figure a vivid personality."
  "NataliiaGrigoreva_smilingCreepyPumpkin_PolymerClay_12cm_135":
    title: "Snarling Pumpkin"
    description: "This sculpture highlights a vividly expressive face shaped from a heavily textured pumpkin form. Bulging green eyes framed by purple lids, deep creases, and a twisted stem create a dramatic focal point, while the uneven yellowed teeth and scar-like surface details give the piece a striking, creature-like presence."
