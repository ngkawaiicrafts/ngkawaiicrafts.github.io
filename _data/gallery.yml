drawings:
  "birdcouple":
    title: "Cute Colorful Birds on a Branch"
    description: "Hand-drawn watercolor illustration of two cute, round birds perched on a branch, featuring bright blue and warm orange feathers. A charming and whimsical artwork evoking friendship, love, and nature, ideal for children's art prints, greeting cards, or decorative wall art inspired by playful songbirds."
  "bluebird":
    title: "Cute Blue Bird Illustration on Branch"
    description: "Adorable pastel watercolor illustration of a fluffy blue bird with a crest, perched on a tree branch with fresh green leaves. Soft gradients of turquoise, purple, and pink create a playful, whimsical character with large sparkling eyes and an orange beak, perfect for children's art, greeting cards, or nursery decor."
  "bluebirdandmushrm":
    title: "Cute Blue Bird with Mushroom and Bunny"
    description: "Charming watercolor illustration of a bright blue bird with a large orange beak standing in a grassy forest clearing beside a red-capped mushroom and a small bunny. Soft pastel colors, playful character design, and a background of pine trees create a whimsical woodland scene ideal for children's books, nursery art, or fantasy animal illustrations."
  "cactus!":
    title: "Cowboy Cactus Riding a Unicorn Stick Horse"
    description: "A playful watercolor illustration of a cactus dressed as a cowboy, complete with hat and bandana, riding a whimsical unicorn stick horse against a vibrant sunset sky."
  "cat":
    title: "Sleeping Cat on Red Yarn Ball"
    description: "A peaceful illustration of a gray cat curled up atop a red ball of yarn, softly wrapped in loose strands, resting against a gentle blue watercolor background."
  "crazyHareBr":
    title: "Quirky Rabbit with Top Hat"
    description: "A playful illustration of a gray rabbit with big blue eyes, a dangling tongue, and a tilted black top hat, set against a soft blue watercolor background."
  "fox":
    title: "Fox at Twilight in Enchanted Forest"
    description: "A warm, stylized scene of a reddish-orange fox sitting thoughtfully at dusk, surrounded by leafy green hills and tall trees, while a small wide-eyed creature peeks from a tree hollow against a glowing orange-to-purple sky."
  "girl_vin3":
    title: "Girl Exploring Nature"
    description: "A gentle watercolor scene showing a red-haired girl enjoying outdoor moments—stepping into a pond, watching a dragonfly while lying in the grass, and observing butterflies among flowers."
  "harvest":
    title: "Rabbits Harvesting Pumpkins in a Autumn Patch"
    description: "A charming illustration of two anthropomorphic rabbits in a pumpkin field—one in a straw hat and overalls carrying a large pumpkin, and a smaller one playfully sitting inside a hollowed pumpkin—set against a soft, colorful outdoor backdrop."
  "koala":
    title: "Cute Koala with Leaf and Toy Mouse"
    description: "A warm watercolor illustration of an upright koala holding a leafy branch, accompanied by a small blue pull-toy mouse, set against a soft peach-yellow background."
  "Krokodilkirya":
    title: "Girl and Friendly Crocodile in Cozy Pink Room"
    description: "A whimsical illustration of a young girl in pigtails standing beside a big pot of noodles while a curious crocodile in a Santa hat sits nearby, all set within a warm, pink, toy-filled bedroom."
  "moonnight1":
    title: "Owl Perched Beneath a Glowing Moon"
    description: "A dreamy nighttime forest scene featuring a wide-eyed owl balanced atop a curved evergreen tree, illuminated by a large glowing moon against deep green and blue woodland shadows."
  "moth":
    title: "Whimsical Moth Creature with Yarn-Like Body"
    description: "A charming watercolor illustration of a moth-like character with patterned wings, fluffy antennae, and a round blue body resembling yarn, set against a warm yellow backdrop."
  "murkacow":
    title: "Chaotic Farmyard with Running Cow"
    description: "A lively, humorous farm scene featuring a startled cow named Murka dashing through the yard as chickens, chicks, a duck, a dog, a mouse, and birds scatter in energetic confusion around her."
  "nest":
    title: "Two Birds Nestled Together on a Branch"
    description: "A colorful illustration of two young sibling birds—one larger, one smaller—sitting side by side in a twig nest on a leafy branch, framed by a soft sky blending blue, pink, and yellow tones."
  "parrot":
    title: "Colorful Parrot Perched on a Berry Branch"
    description: "A vibrant illustration of a yellow-headed, green-bodied bird resting on a leafy branch adorned with red berries, set against a soft blue sky with gentle clouds."
  "sharkrider":
    title: "Shark rider"
    description: "A playful underwater illustration featuring a red octopus perched confidently on the back of a large shark, dangling a tiny, wide-eyed hammerhead as bait on a fishing line, all set against a soft blue watercolor backdrop."
  "snow_cardinal":
    title: "Winter Birds on a Wire"
    description: "A lively winter watercolor showing three birds balanced on a wire while a bright blue bird swoops in, clearly aiming to settle beside them against a softly snow-dusted sky."
  "yozhik":
    title: "Hedgehog Pulling an Apple Cart"
    description: "A playful watercolor scene featuring a smiling hedgehog strolling through the grass with a blue flower in hand, pulling a wheeled apple cart decorated with colorful stickers. Small details like a ladybug, a worm by a rock, and scattered blades of grass add charm and storybook warmth to the illustration."

lampwork:
  "PXL_20230106_233835775-01":
    title: "Autumn Green Lampwork Bracelet"
    description: "Handmade glass beads in amber, white, and muted green create a soft, earthy palette. Subtle swirls and raised dots add gentle texture without overwhelming the warm, organic mood."
  "PXL_20230106_233910220-01":
    title: "Vibrant Blue and Ember Lampwork Bracelet"
    description: "Bright blues paired with warm orange and deep red beads give this glass-bead bracelet a lively, energetic feel. Patterned accents and speckled details keep the mix playful and balanced."
  "PXL_20230106_233923673-01":
    title: "Lavender and Ember Accent Lampwork Bracelet"
